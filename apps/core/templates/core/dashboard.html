{% extends "base.html" %}

{% block title %}Dashboard | FindIt{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-9">
    <div class="p-4 p-md-5 bg-white rounded shadow-sm">
      <h1 class="h4 mb-2">
        <i class="bi bi-shield-lock me-2 text-success"></i>
        Authenticated area
      </h1>

      <p class="text-muted mb-4">
        You are logged in as <strong>{{ user.email|default:user.get_username }}</strong>.
      </p>

      <div class="alert alert-info mb-0">
        Next: wire chat/listings modules or add a simple feed.
      </div>
    </div>
  </div>
</div>
{% endblock %}
