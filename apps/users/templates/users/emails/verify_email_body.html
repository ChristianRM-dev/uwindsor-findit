<!DOCTYPE html>
<html lang="en">
  <body style="margin:0; padding:24px; background:#f6f8fb; font-family:Arial, sans-serif; color:#1f2937;">
    <div style="max-width:560px; margin:0 auto; background:#ffffff; border:1px solid #e5e7eb; border-radius:16px; padding:32px;">
      <h1 style="margin:0 0 16px; font-size:24px; line-height:1.2;">Verify your email</h1>
      <p style="margin:0 0 16px; font-size:16px; line-height:1.6;">Hi,</p>
      <p style="margin:0 0 24px; font-size:16px; line-height:1.6;">
        Thanks for registering on FindIt. Confirm your email to activate your account.
      </p>
      <p style="margin:0 0 24px;">
        <a
          href="{{ verify_url }}"
          target="_blank"
          rel="noopener noreferrer"
          style="display:inline-block; background:#0d6efd; color:#ffffff; text-decoration:none; padding:14px 22px; border-radius:999px; font-size:16px; font-weight:600;"
        >
          Verify Email
        </a>
      </p>
      <p style="margin:0 0 12px; font-size:14px; line-height:1.6; color:#4b5563;">
        If the button does not work, copy and paste this link into your browser:
      </p>
      <p style="margin:0 0 24px; font-size:14px; line-height:1.6; word-break:break-all;">
        <a href="{{ verify_url }}" target="_blank" rel="noopener noreferrer" style="color:#0d6efd;">{{ verify_url }}</a>
      </p>
      <p style="margin:0; font-size:14px; line-height:1.6; color:#6b7280;">
        If you did not create this account, you can ignore this email.
      </p>
    </div>
  </body>
</html>
