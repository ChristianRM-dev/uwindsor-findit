services:
  - type: web
    name: uwindsor-findit-dev
    runtime: python
    plan: free
    region: ohio
    branch: dev
    autoDeployTrigger: checksPass
    healthCheckPath: /health/
    buildCommand: pip install -r requirements/prod.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate && python manage.py seed_minimal_catalogs && python manage.py seed_message_demo
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: uwindsor-findit-dev.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://uwindsor-findit-dev.onrender.com
      - key: DJANGO_SERVE_MEDIA_LOCALLY
        value: "true"
      - key: DJANGO_EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: DJANGO_EMAIL_HOST
        sync: false
      - key: DJANGO_EMAIL_PORT
        sync: false
      - key: DJANGO_EMAIL_HOST_USER
        sync: false
      - key: DJANGO_EMAIL_HOST_PASSWORD
        sync: false
      - key: DJANGO_EMAIL_USE_TLS
        value: "true"
      - key: DJANGO_DEFAULT_FROM_EMAIL
        sync: false
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: uwindsor-findit-dev-db
          property: connectionString

databases:
  - name: uwindsor-findit-dev-db
    plan: free
    region: ohio
    postgresMajorVersion: "16"
