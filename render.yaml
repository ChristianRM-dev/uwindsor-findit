services:
  - type: web
    name: uwindsor-findit-dev
    runtime: python
    plan: free
    region: ohio
    branch: dev
    autoDeployTrigger: checksPass
    healthCheckPath: /health/
    buildCommand: pip install -r requirements/prod.txt && python manage.py collectstatic --noinput
    startCommand: ./scripts/render-start.sh
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: uwindsor-findit-dev.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://uwindsor-findit-dev.onrender.com
      - key: DJANGO_SERVE_MEDIA_LOCALLY
        value: "true"
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: uwindsor-findit-dev-db
          property: connectionString

databases:
  - name: uwindsor-findit-dev-db
    plan: free
    region: ohio
    postgresMajorVersion: "16"
