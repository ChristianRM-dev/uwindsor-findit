{% extends "layouts/public_base.html" %}

{% block title %}Permission Denied{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7 text-center">
      <div class="mb-3">
        <i class="bi bi-shield-lock display-3 text-warning"></i>
      </div>
      <h1 class="display-6 fw-bold">403 - Permission Denied</h1>
      <p class="text-muted mt-3">
        You do not have permission to access this page or perform this action.
      </p>

      <div class="d-flex justify-content-center gap-2 mt-4">
        <a href="{% url 'core:home' %}" class="btn btn-primary">Back to Home</a>
        <a href="{% url 'core:contact' %}" class="btn btn-outline-secondary">Contact Support</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
