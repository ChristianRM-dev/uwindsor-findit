{% extends "layouts/public_base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7 text-center">
      <div class="mb-3">
        <i class="bi bi-exclamation-triangle display-3 text-warning"></i>
      </div>
      <h1 class="display-6 fw-bold">404 - Page Not Found</h1>
      <p class="text-muted mt-3">
        The page you are looking for does not exist, may have been moved, or is no longer available.
      </p>

      <div class="d-flex justify-content-center gap-2 mt-4">
        <a href="{% url 'core:home' %}" class="btn btn-primary">Back to Home</a>
        <a href="{% url 'listings:search_results' %}" class="btn btn-outline-secondary">Browse Items</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
