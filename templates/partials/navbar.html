<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
  <div class="container py-2">

    <!-- Brand (Left) -->
    <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="/">
      <i class="bi bi-geo-alt-fill"></i>
      <span>FindIt</span>
    </a>

    <!-- Toggler -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNavbar"
      aria-controls="mainNavbar"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">

      <!-- Center: Search (Hero-like) -->
      <form
        class="d-flex flex-column flex-lg-row align-items-stretch align-items-lg-center gap-2 mx-lg-auto my-3 my-lg-0"
        method="get"
        action="/search/"
        role="search"
        style="max-width: 720px; width: 100%;"
      >
        <div class="input-group">
          <span class="input-group-text bg-light">
            <i class="bi bi-search"></i>
          </span>

          <input
            type="search"
            name="q"
            class="form-control"
            placeholder="Search lost & found items..."
            aria-label="Search items"
            value="{{ request.GET.q|default:'' }}"
          />

          <button class="btn btn-primary" type="submit">
            Search
          </button>
        </div>

        <!-- Optional quick filter row (remove if you don't want it) -->
        <div class="d-flex gap-2">
          <select class="form-select" name="type" aria-label="Type filter">
            <option value="" {% if not request.GET.type %}selected{% endif %}>All</option>
            <option value="lost" {% if request.GET.type == "lost" %}selected{% endif %}>Lost</option>
            <option value="found" {% if request.GET.type == "found" %}selected{% endif %}>Found</option>
          </select>

          <select class="form-select" name="category" aria-label="Category filter">
            <option value="" {% if not request.GET.category %}selected{% endif %}>Any category</option>
            <!-- If you have categories in context, render them -->
            {% if categories %}
              {% for c in categories %}
                <option value="{{ c }}" {% if request.GET.category == c %}selected{% endif %}>{{ c }}</option>
              {% endfor %}
            {% endif %}
          </select>
        </div>
      </form>

      <!-- Right: Auth buttons -->
      <ul class="navbar-nav ms-lg-auto align-items-lg-center gap-2">

        {% if user.is_authenticated %}
          <li class="nav-item">
            <a class="btn btn-outline-secondary btn-sm" href="/dashboard/">
              <i class="bi bi-speedometer2 me-1"></i> Dashboard
            </a>
          </li>

          <li class="nav-item">
            <span class="navbar-text small text-muted d-none d-lg-inline">
              <i class="bi bi-person-circle me-1"></i>{{ user.get_username }}
            </span>
          </li>

          <li class="nav-item">
            <form method="post" action="{% url 'users:logout' %}" class="d-inline">
              {% csrf_token %}
              <button class="btn btn-outline-danger btn-sm" type="submit">
                <i class="bi bi-box-arrow-right me-1"></i> Logout
              </button>
            </form>
          </li>

        {% else %}
          <li class="nav-item">
            <a class="btn btn-outline-primary btn-sm" href="/auth/login/">
              <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </a>
          </li>
          <li class="nav-item">
            <a class="btn btn-primary btn-sm" href="/auth/register/">
              <i class="bi bi-person-plus me-1"></i> Register
            </a>
          </li>
        {% endif %}

      </ul>
    </div>
  </div>
</nav>
