<div class="bg-white border rounded p-4 text-center">
  <div class="display-6 text-muted mb-2">
    <i class="bi bi-inbox"></i>
  </div>
  <h2 class="h6 mb-2">{{ title|default:"Nothing here yet" }}</h2>
  <p class="text-muted small mb-3">{{ message|default:"Try adjusting your filters or come back later." }}</p>

  {% if cta_url and cta_label %}
    <a class="btn btn-primary btn-sm" href="{{ cta_url }}">{{ cta_label }}</a>
  {% endif %}
</div>
