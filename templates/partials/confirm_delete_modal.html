<div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-labelledby="confirmDeleteModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="confirmDeleteForm" method="post">
        <div class="modal-header">
          <h5 class="modal-title" id="confirmDeleteModalLabel">Confirm Delete</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
          {% csrf_token %}
          <p class="mb-2">Are you sure you want to delete this item?</p>
          <p class="text-muted small mb-0" id="confirmDeleteItemTitle"></p>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-danger">Delete</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const modal = document.getElementById("confirmDeleteModal");
    const form = document.getElementById("confirmDeleteForm");
    const itemTitle = document.getElementById("confirmDeleteItemTitle");

    if (!modal || !form) return;

    modal.addEventListener("show.bs.modal", function (event) {
      const trigger = event.relatedTarget;
      if (!trigger) return;

      const deleteUrl = trigger.getAttribute("data-delete-url");
      const title = trigger.getAttribute("data-item-title");

      form.setAttribute("action", deleteUrl || "#");
      itemTitle.textContent = title ? `Item: ${title}` : "";
    });
  });
</script>
