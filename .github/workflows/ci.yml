name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  django:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: findit_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d findit_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/findit_ci
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,0.0.0.0,testserver
      DJANGO_CSRF_TRUSTED_ORIGINS: http://127.0.0.1,http://localhost
      DJANGO_SERVE_MEDIA_LOCALLY: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run system checks
        run: python manage.py check

      - name: Run test suite
        run: python manage.py test apps.core.tests apps.chat.tests apps.listings.tests

      - name: Collect static files
        run: python manage.py collectstatic --noinput
